name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/AurumSignals

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Installing dependencies"
            npm ci --omit=dev

            echo "==> Syntax check"
            node --check server.js

            echo "==> Ensuring log rotation is configured"
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 20M    2>/dev/null || true
            pm2 set pm2-logrotate:retain 7        2>/dev/null || true
            pm2 set pm2-logrotate:compress false  2>/dev/null || true
            pm2 set pm2-logrotate:rotateInterval '0 0 * * *' 2>/dev/null || true

            echo "==> Ensuring Litestream replication is running"
            if systemctl is-active --quiet litestream; then
              echo "    Litestream: active"
            else
              echo "    Litestream: not running — attempting restart"
              systemctl restart litestream 2>/dev/null || echo "    Litestream not installed — run scripts/setup-litestream.sh"
            fi

            echo "==> Reloading PM2 processes"
            pm2 reload ecosystem.config.js --update-env

            echo "==> Saving PM2 process list"
            pm2 save

            echo "==> Deploy complete"
