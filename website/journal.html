<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NQ Signal Engine — Trade Journal</title>
  <style>
    :root{
      --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e2a;
      --border:#252a38;--text:#e2e8f0;--muted:#64748b;
      --green:#22c55e;--red:#ef4444;--yellow:#eab308;
      --blue:#3b82f6;--purple:#a855f7;
      --font:'SF Mono','Fira Code','Consolas',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
    a{color:var(--blue);text-decoration:none}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:32px;height:52px}
    .nav-brand{font-size:15px;font-weight:700;letter-spacing:.05em}
    .nav-brand span{color:var(--blue)}
    .nav-tag{font-size:9px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:var(--blue);padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle}
    .nav-links{display:flex;gap:4px}
    .nav-links a{padding:6px 14px;border-radius:6px;color:var(--muted);font-size:12px;transition:.15s}
    .nav-links a.active,.nav-links a:hover{background:var(--surface2);color:var(--text);text-decoration:none}
    .nav-links a.active{color:var(--blue)}
    .page{max-width:1200px;margin:0 auto;padding:24px 16px}
    .section-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    select,input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:var(--font);font-size:12px}
    select:focus,input:focus{outline:none;border-color:var(--blue)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
    th:hover{color:var(--text)}
    td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface2)}
    .badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
    .badge.LONG{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .badge.SHORT{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
    .badge.WIN,.badge.TP1,.badge.TP2,.badge.TP3,.badge.TP4{background:rgba(34,197,94,.12);color:var(--green)}
    .badge.LOSS,.badge.SL{background:rgba(239,68,68,.12);color:var(--red)}
    .badge.BE{background:rgba(234,179,8,.12);color:var(--yellow)}
    .badge.OPEN{background:rgba(59,130,246,.12);color:var(--blue)}
    .badge.EXPIRED{background:rgba(100,116,139,.12);color:var(--muted)}
    .pager{display:flex;gap:8px;align-items:center;margin-top:16px;justify-content:center}
    .pager button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:5px;cursor:pointer;font-family:var(--font);font-size:12px}
    .pager button:hover{border-color:var(--blue);color:var(--blue)}
    .pager button:disabled{opacity:.4;cursor:default}
    .pager span{color:var(--muted);font-size:11px}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">NQ <span>Signal Engine</span><span class="nav-tag">AUTONOMOUS</span></div>
  <div class="nav-links">
    <a href="index.html">Live</a>
    <a href="performance.html">Performance</a>
    <a href="journal.html" class="active">Journal</a>
  </div>
</nav>
<div class="page">
  <div class="section-title">Trade Journal</div>
  <div class="toolbar">
    <select id="f-status" onchange="applyFilters()">
      <option value="">All Status</option>
      <option value="OPEN">Open</option>
      <option value="CLOSED">Closed</option>
    </select>
    <select id="f-dir" onchange="applyFilters()">
      <option value="">All Directions</option>
      <option value="LONG">Long</option>
      <option value="SHORT">Short</option>
    </select>
    <select id="f-result" onchange="applyFilters()">
      <option value="">All Results</option>
      <option value="WIN">Wins</option>
      <option value="LOSS">Losses</option>
      <option value="BE">Breakeven</option>
    </select>
    <input type="text" id="f-search" placeholder="Search setup..." oninput="applyFilters()" style="min-width:160px">
    <span style="color:var(--muted);font-size:11px;margin-left:auto" id="result-count"></span>
  </div>
  <div class="card">
    <table>
      <thead><tr>
        <th onclick="sort('opened_at')">Time</th>
        <th onclick="sort('direction')">Dir</th>
        <th onclick="sort('setup')">Setup</th>
        <th onclick="sort('grade')">Grade</th>
        <th>Entry</th>
        <th>Exit</th>
        <th onclick="sort('exit_reason')">Result</th>
        <th onclick="sort('pnl_points')">P&L (pts)</th>
        <th onclick="sort('pnl_dollars')">P&L ($)</th>
        <th>Status</th>
      </tr></thead>
      <tbody id="journal-body"></tbody>
    </table>
  </div>
  <div class="pager">
    <button id="btn-prev" onclick="prevPage()" disabled>&#x2190; Prev</button>
    <span id="page-info"></span>
    <button id="btn-next" onclick="nextPage()">Next &#x2192;</button>
  </div>
</div>
<script>
const API = 'https://nq-signal-pro.onrender.com';
let allTrades=[], filtered=[], page=0, pageSize=25, sortKey=null, sortDir=1;
const fmtDate = ts => ts ? new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}) : '-';
const fmt = (v,d=2) => v!=null ? Number(v).toFixed(d) : '-';

async function load() {
  try {
    const data = await fetch(API + '/performance/trades?limit=200').then(r=>r.json());
    // Enrich with signal data
    const sigs = await fetch(API + '/signals?limit=200').then(r=>r.json());
    const sigMap = Object.fromEntries(sigs.map(s=>[s.id, s]));
    allTrades = data.map(t => ({
      ...t,
      setup: sigMap[t.signal_id]?.setup_type || '-',
      grade: sigMap[t.signal_id]?.grade || '-',
    }));
    applyFilters();
  } catch(e) { console.error(e); }
}

function applyFilters() {
  const status  = document.getElementById('f-status').value;
  const dir     = document.getElementById('f-dir').value;
  const result  = document.getElementById('f-result').value;
  const search  = document.getElementById('f-search').value.toLowerCase();
  filtered = allTrades.filter(t => {
    if (status && t.status !== status) return false;
    if (dir && t.direction !== dir) return false;
    if (result) {
      if (result === 'WIN' && !t.is_win) return false;
      if (result === 'LOSS' && (t.is_win || t.exit_reason==='BE' || t.exit_reason==='EXPIRED')) return false;
      if (result === 'BE' && t.exit_reason !== 'BE') return false;
    }
    if (search && !t.setup.toLowerCase().includes(search)) return false;
    return true;
  });
  if (sortKey) filtered.sort((a,b)=>((a[sortKey]??0) > (b[sortKey]??0) ? sortDir : -sortDir));
  page = 0;
  renderPage();
}

function sort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  applyFilters();
}

function renderPage() {
  const start = page * pageSize;
  const slice = filtered.slice(start, start + pageSize);
  document.getElementById('result-count').textContent = `${filtered.length} trades`;
  document.getElementById('page-info').textContent = `Page ${page+1} of ${Math.max(1, Math.ceil(filtered.length/pageSize))}`;
  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = start + pageSize >= filtered.length;
  const tbody = document.getElementById('journal-body');
  tbody.innerHTML = slice.map(t => {
    const result = t.is_win ? 'WIN' : t.exit_reason === 'BE' ? 'BE' : t.exit_reason === 'SL' ? 'LOSS' : t.exit_reason || (t.status==='OPEN'?'OPEN':'');
    const pnlColor = t.pnl_dollars > 0 ? 'color:var(--green)' : t.pnl_dollars < 0 ? 'color:var(--red)' : '';
    return `<tr>
      <td>${fmtDate(t.opened_at)}</td>
      <td><span class="badge ${t.direction}">${t.direction}</span></td>
      <td>${t.setup}</td>
      <td style="color:${t.grade==='A+'?'var(--yellow)':'var(--blue)'}">${t.grade}</td>
      <td>${fmt(t.entry_price)}</td>
      <td>${fmt(t.exit_price)}</td>
      <td><span class="badge ${result}">${result||'-'}</span></td>
      <td style="${pnlColor}">${t.pnl_points!=null?(t.pnl_points>0?'+':'')+fmt(t.pnl_points,1):'-'}</td>
      <td style="${pnlColor}">${t.pnl_dollars!=null?(t.pnl_dollars>0?'+':'')+'$'+fmt(t.pnl_dollars,0):'-'}</td>
      <td><span class="badge ${t.status}">${t.status}</span></td>
    </tr>`;
  }).join('');
}
function prevPage(){if(page>0){page--;renderPage();}}
function nextPage(){if((page+1)*pageSize<filtered.length){page++;renderPage();}}
load();
</script>
</body>
</html>
