<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Signals — Journal</title>
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  </style>
</head>
<body>

<!-- ── TOP NAV ──────────────────────────────────────── -->
<header class="top-nav">
  <div class="top-nav-left">
    <a href="/" class="logo">AURUM <span class="logo-accent">SIGNALS</span></a>
    <nav class="nav-links">
      <a href="/"         class="nav-link">Home</a>
      <a href="/signals"  class="nav-link">Signals</a>
      <a href="/trades"   class="nav-link">Trades</a>
      <a href="/stats"    class="nav-link">Stats</a>
      <a href="/calendar" class="nav-link">Calendar</a>
      <a href="/backtest" class="nav-link">Backtest</a>
      <a href="/journal"  class="nav-link active">Journal</a>
      <a href="/news"     class="nav-link">News</a>
      <a href="/setup"    class="nav-link">Setup</a>
    </nav>
  </div>
  <div class="top-nav-right">
    <span class="refresh-label" id="lastRefresh">—</span>
    <div id="navUser"></div>
  </div>
</header>

<!-- ── SECTION SWITCHER ──────────────────────────────── -->
<div class="section-switcher">
  <button class="section-switch-btn active" id="btnReal"    onclick="showSection('real')">Real Signals</button>
  <button class="section-switch-btn"        id="btnBt"      onclick="showSection('bt')">Backtesting</button>
  <a href="/reports" class="section-switch-btn" style="text-decoration:none">Reports →</a>
  <button class="section-switch-btn"        id="btnCompose" onclick="showSection('compose')">Compose</button>
</div>

<!-- ── BODY ─────────────────────────────────────────── -->
<div class="page-body">

  <!-- ── REAL SIGNALS SECTION ── -->
  <div class="page-section active" id="secReal">
    <div class="section-top-bar">
      <div class="filter-chips">
        <button class="filter-chip active" id="rAll"  onclick="setRFilter('ALL',this)">All</button>
        <button class="filter-chip"        id="rWin"  onclick="setRFilter('WIN',this)">Win</button>
        <button class="filter-chip"        id="rLoss" onclick="setRFilter('LOSS',this)">Loss</button>
        <button class="filter-chip"        id="rBe"   onclick="setRFilter('BE',this)">BE</button>
      </div>
      <div class="mini-stats" id="realStats"></div>
    </div>
    <div id="realFeed" style="flex:1;overflow-y:auto"></div>
  </div>

  <!-- ── BACKTESTING SECTION ── -->
  <div class="page-section" id="secBt">
    <div class="section-top-bar">
      <div class="filter-chips">
        <button class="filter-chip active" onclick="setBtFilter('ALL',this)">All</button>
        <button class="filter-chip"        onclick="setBtFilter('MNQ',this)">MNQ</button>
        <button class="filter-chip"        onclick="setBtFilter('MGC',this)">MGC</button>
      </div>
      <div class="mini-stats" id="btStats"></div>
    </div>
    <div id="btFeed" style="flex:1;overflow-y:auto"></div>
  </div>

  <!-- ── WEEKLY SUMMARY SECTION — moved to /reports ── -->
  <div class="page-section" id="secWeekly" style="overflow-y:auto;padding:40px 16px 88px;display:none">
    <div style="text-align:center;color:rgba(255,255,255,.4);font:13px monospace">
      Weekly summaries have moved to <a href="/reports" style="color:#a78bfa">Reports</a>.
    </div>
  </div>

  <!-- ── COMPOSE SECTION ── -->
  <div class="page-section" id="secCompose" style="overflow-y:auto;padding:0 16px 88px;">

    <!-- Entry Composer -->
    <div style="max-width:640px;margin:0 auto;padding-top:16px;">

      <div class="card" style="margin-bottom:16px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;">New Entry</div>

        <!-- Type selector -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="typeChips">
          <button class="filter-chip active" onclick="setType('observation',this)">Observation</button>
          <button class="filter-chip"        onclick="setType('lesson',this)">Lesson</button>
          <button class="filter-chip"        onclick="setType('plan',this)">Plan</button>
          <button class="filter-chip"        onclick="setType('risk',this)">Risk Note</button>
          <button class="filter-chip"        onclick="setType('review',this)">Review</button>
        </div>

        <!-- Body textarea -->
        <textarea id="composeBody" rows="5"
          placeholder="Write your observation, lesson, or plan…"
          style="width:100%;box-sizing:border-box;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:8px;padding:10px 12px;font-family:var(--font-body);font-size:13px;color:var(--text-primary);resize:vertical;line-height:1.6;outline:none;transition:border-color var(--t);"
          onfocus="this.style.borderColor='var(--blue)'"
          onblur="this.style.borderColor='var(--border-default)'"
        ></textarea>

        <!-- Tag quick-add -->
        <div style="margin-top:10px;">
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;">Quick tags</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;" id="tagButtons">
            <button class="tag-chip htf"    onmousedown="addTag('[HTF]')">HTF bias</button>
            <button class="tag-chip ote"    onmousedown="addTag('[OTE]')">OTE zone</button>
            <button class="tag-chip chop"   onmousedown="addTag('[CHOP]')">chop/range</button>
            <button class="tag-chip score"  onmousedown="addTag('[SCORE]')">low score</button>
            <button class="tag-chip timing" onmousedown="addTag('[TIMING]')">timing</button>
            <button class="tag-chip regime" onmousedown="addTag('[REGIME]')">wrong regime</button>
          </div>
        </div>

        <!-- Tags field + Save -->
        <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
          <input id="composeTags" type="text" placeholder="tags, comma-separated (optional)"
            style="flex:1;background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text-primary);font-family:var(--font-body);outline:none;transition:border-color var(--t);"
            onfocus="this.style.borderColor='var(--blue)'"
            onblur="this.style.borderColor='var(--border-default)'" />
          <button onclick="saveEntry()" style="background:var(--blue);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity var(--t);" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">Save</button>
        </div>
        <div id="composeSaved" style="font-size:11px;color:var(--green);margin-top:8px;height:16px;transition:opacity .3s;opacity:0;"></div>
      </div>

      <!-- Saved entries list -->
      <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:10px 0 8px;border-bottom:1px solid var(--border-subtle);margin-bottom:10px;display:flex;align-items:center;gap:8px;">
        Saved Entries<span style="flex:1;height:1px;background:var(--border-subtle);display:block;"></span>
      </div>
      <div id="entriesFeed"></div>

    </div>
  </div><!-- /secCompose -->

</div><!-- /page-body -->

<!-- ── BOTTOM NAV (mobile) ───────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-items">
    <a href="/" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="bottom-nav-label">Home</span>
    </a>
    <a href="/signals" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
      <span class="bottom-nav-label">Signals</span>
    </a>
    <a href="/trades" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="bottom-nav-label">Trades</span>
    </a>
    <a href="/journal" class="bottom-nav-item active">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>
      <span class="bottom-nav-label">Journal</span>
    </a>
  </div>
</nav>

<script src="/ui-components.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let realSignals = [], btRuns = [], journalEntries = [], weeklySummaries = [];
let rFilter = 'ALL', btFilter = 'ALL';
let composeType = 'observation';
const expandedSigs = new Set();
const expandedRuns = new Set();
const runTradeCache = {};
const saveTimers = {};
let activeSection = 'real';

// ── Section switch ─────────────────────────────────────────────────────────────
function showSection(s) {
  activeSection = s;
  ['real','bt','weekly','compose'].forEach(sec => {
    document.getElementById('sec' + sec.charAt(0).toUpperCase() + sec.slice(1))?.classList.toggle('active', s === sec);
    document.getElementById('btn' + sec.charAt(0).toUpperCase() + sec.slice(1))?.classList.toggle('active', s === sec);
  });
  if (s === 'bt' && !btRuns.length) loadBacktest();
  if (s === 'compose') loadEntries();
  if (s === 'weekly') loadWeeklySummaries();
}

// ── Filters ────────────────────────────────────────────────────────────────────
function setRFilter(f, btn) {
  rFilter = f;
  document.querySelectorAll('#secReal .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReal();
}
function setBtFilter(f, btn) {
  btFilter = f;
  document.querySelectorAll('#secBt .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBt();
}

// ── Real Signals renderer ──────────────────────────────────────────────────────
function renderReal() {
  const el       = document.getElementById('realFeed');
  const filtered = realSignals.filter(s => rFilter === 'ALL' || s.result === rFilter);

  // Mini stats
  const wins = realSignals.filter(s => s.result === 'WIN').length;
  const loss = realSignals.filter(s => s.result === 'LOSS').length;
  const be   = realSignals.filter(s => s.result === 'BE').length;
  const wr   = (wins + loss) > 0 ? (wins / (wins + loss) * 100).toFixed(1) + '%' : '—';
  document.getElementById('realStats').innerHTML =
    `<span class="mini-stat"><span class="v info">${realSignals.length}</span> logged</span>` +
    `<span class="mini-stat"><span class="v win">${wins}W</span></span>` +
    `<span class="mini-stat"><span class="v loss">${loss}L</span></span>` +
    `<span class="mini-stat"><span class="v be">${be}BE</span></span>` +
    `<span class="mini-stat"><span class="v win">${wr}</span> WR</span>`;

  if (!filtered.length) {
    el.innerHTML = buildEmptyState(
      '◎',
      `No ${rFilter === 'ALL' ? 'logged' : rFilter} signals`,
      'Mark signals as WIN / LOSS / BE on the Live Signals page to populate the journal.'
    );
    return;
  }

  // Group by day
  const groups = {};
  for (const s of filtered) {
    const k = dateKey(s.received_at);
    (groups[k] = groups[k] || []).push(s);
  }

  let html = '';
  for (const [day, sigs] of Object.entries(groups)) {
    html += `<div class="date-divider">${day}</div>`;
    for (const s of sigs) {
      const canEdit  = s.result === 'LOSS' || s.result === 'BE';
      const hasNote  = s.notes && s.notes.trim();
      const isExp    = expandedSigs.has(s.id);
      const notePreview = hasNote
        ? `<span class="journal-note-preview has">${escH(s.notes)}</span>`
        : canEdit
          ? `<span class="journal-note-preview ph">add note…</span>`
          : `<span class="journal-note-preview"></span>`;
      const caretHtml = (canEdit || hasNote) ? `<span class="journal-caret">›</span>` : '';
      const pnlStr = s.pnl_pts != null ? ` ${s.pnl_pts >= 0 ? '+' : ''}${s.pnl_pts}` : '';

      html += `<div class="journal-row ${canEdit ? 'clickable' : ''} ${isExp ? 'expanded' : ''}"
                    data-id="${s.id}" onclick="toggleSig(${s.id})">
        <span class="journal-time">${hhmm(s.received_at)}</span>
        <span class="journal-dir ${s.direction === 'LONG' ? 'long' : 'short'}">${s.direction === 'LONG' ? '▲' : '▼'}</span>
        <span class="journal-grade ${s.grade === 'A+' ? 'aplus' : 'a'}">${s.grade || 'A'}</span>
        <span class="journal-setup">${escH(s.setup || '—')}</span>
        <span class="journal-style">${escH(s.trade_style || '')}</span>
        <span class="journal-result ${s.result}">${s.result}${pnlStr}</span>
        ${notePreview}
        ${caretHtml}
      </div>
      <div class="note-editor ${isExp ? 'open' : ''}" id="nw-${s.id}">
        <textarea id="nt-${s.id}" rows="3"
          placeholder="${s.result === 'WIN' ? 'Optional note…' : 'What happened? Why did it ' + (s.result === 'LOSS' ? 'lose?' : 'break even?')}"
          onblur="scheduleSaveSig(${s.id})"
          oninput="onNoteInput(${s.id})"
        >${escH(s.notes || '')}</textarea>
        <div class="note-editor-footer">
          <span class="saved-flash" id="sf-${s.id}">✓ saved</span>
        </div>
      </div>`;
    }
  }
  el.innerHTML = html;

  // Re-size open editors
  for (const id of expandedSigs) {
    const ta = document.getElementById('nt-' + id);
    if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  }
}

function toggleSig(id) {
  const s = realSignals.find(s => s.id === id);
  if (!s || (s.result === 'WIN' && !(s.notes && s.notes.trim()))) return;
  expandedSigs.has(id) ? expandedSigs.delete(id) : expandedSigs.add(id);
  renderReal();
  if (expandedSigs.has(id)) {
    requestAnimationFrame(() => {
      const ta = document.getElementById('nt-' + id);
      if (ta) { ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; }
    });
  }
}

function onNoteInput(id) {
  const ta = document.getElementById('nt-' + id);
  if (!ta) return;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function scheduleSaveSig(id) {
  clearTimeout(saveTimers['s' + id]);
  saveTimers['s' + id] = setTimeout(() => saveSigNote(id), 400);
}

async function saveSigNote(id) {
  const ta = document.getElementById('nt-' + id);
  if (!ta) return;
  const note = ta.value.trim();
  const sig  = realSignals.find(s => s.id === id);
  if (sig) sig.notes = note;
  await fetch('/api/journal/signal-note', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ signal_id: id, note }),
  });
  const flash = document.getElementById('sf-' + id);
  if (flash) {
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1800);
  }
}

// ── Backtest renderer ──────────────────────────────────────────────────────────
function updateBtStats() {
  const filtered = btFilter === 'ALL' ? btRuns : btRuns.filter(r => r.instrument === btFilter);
  const totalWins   = filtered.reduce((s, r) => s + (r.win_count  || 0), 0);
  const totalLoss   = filtered.reduce((s, r) => s + (r.loss_count || 0), 0);
  const noted       = filtered.reduce((s, r) => s + (r.noted_count || 0), 0);
  const totalTrades = totalWins + totalLoss;
  const btWr        = totalTrades > 0 ? (totalWins / totalTrades * 100).toFixed(1) + '%' : '—';

  // Aggregate per-strategy stats from any already-loaded trade caches
  const aggByStrat   = {};
  const filteredIds  = new Set(filtered.map(r => r.id));
  const STRAT_ORDER_BT = ['MNQ Intraday', 'MNQ Swing', 'MNQ 50-Point', 'MGC Scalp', 'MGC Intraday'];
  for (const [runId, trades] of Object.entries(runTradeCache)) {
    if (!filteredIds.has(+runId)) continue;
    for (const t of trades) {
      const sn = t.setup || t.strategy_name || 'Unknown';
      if (!aggByStrat[sn]) aggByStrat[sn] = { wins: 0, losses: 0, be: 0 };
      if (t.outcome === 'WIN')       aggByStrat[sn].wins++;
      else if (t.outcome === 'LOSS') aggByStrat[sn].losses++;
      else                           aggByStrat[sn].be++;
    }
  }
  const aggEntries = [
    ...STRAT_ORDER_BT.filter(k => aggByStrat[k]),
    ...Object.keys(aggByStrat).filter(k => !STRAT_ORDER_BT.includes(k)),
  ];
  const aggTable = aggEntries.length ? `
    <span class="mini-stat" style="margin-left:8px;border-left:1px solid rgba(255,255,255,.1);padding-left:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      ${aggEntries.map(name => {
        const s   = aggByStrat[name];
        const tot = s.wins + s.losses + s.be;
        const wr  = tot > 0 ? (s.wins / tot * 100).toFixed(0) : null;
        const col = wr == null ? 'var(--text-muted)' : +wr >= 55 ? 'var(--green)' : +wr >= 45 ? 'var(--yellow)' : 'var(--red)';
        return `<span style="white-space:nowrap;font-size:10px"><span style="color:rgba(255,255,255,.5)">${escH(name)}:</span> <b style="color:${col}">${wr ?? '—'}%</b> <span style="color:rgba(255,255,255,.35)">${tot}t</span></span>`;
      }).join('')}
    </span>` : '';

  const el = document.getElementById('btStats');
  if (el) el.innerHTML =
    `<span class="mini-stat"><span class="v info">${filtered.length}</span> runs</span>` +
    `<span class="mini-stat"><span class="v win">${totalWins}</span> wins</span>` +
    `<span class="mini-stat"><span class="v loss">${totalLoss}</span> losses/BEs</span>` +
    `<span class="mini-stat"><span class="v win">${btWr}</span> WR</span>` +
    `<span class="mini-stat"><span class="v info">${noted}</span> noted</span>` +
    aggTable;
}

function renderBt() {
  const el       = document.getElementById('btFeed');
  const filtered = btFilter === 'ALL' ? btRuns : btRuns.filter(r => r.instrument === btFilter);

  updateBtStats();

  if (!filtered.length) {
    el.innerHTML = buildEmptyState(
      '◉',
      'No backtest runs yet',
      'The scanner runs backtests automatically on startup and every 4 hours. Trades from each run appear here for review.'
    );
    return;
  }

  let html = '';
  for (const r of filtered) {
    const total  = (r.win_count || 0) + (r.loss_count || 0);
    const wr     = total > 0 ? ((r.win_count || 0) / total * 100).toFixed(1) : null;
    const wrCls  = wr != null ? wrClass((r.win_count || 0) / total) : '';
    const isOpen = expandedRuns.has(r.id);
    const dt     = r.run_at.slice(0, 16).replace('T', ' ');
    const inst   = r.instrument?.toLowerCase() || 'mnq';
    const wins   = r.win_count  || 0;
    const losses = r.loss_count || 0;
    const notedStr = r.noted_count > 0
      ? `<b>${r.noted_count}</b>/${losses} noted`
      : losses > 0 ? `${losses} not noted` : 'no losses';

    html += `<div class="bt-run-card ${isOpen ? 'open' : ''}" id="run-${r.id}">
      <div class="bt-run-header" onclick="toggleRun(${r.id})">
        <span class="bt-run-caret">›</span>
        <span class="bt-run-inst ${inst}">${r.instrument}</span>
        <span class="bt-run-date">${dt}</span>
        <span class="bt-run-wr ${wrCls}">${wr != null ? wr + '%' : '—'}</span>
        <span class="bt-run-meta">${total} trades · <span style="color:var(--green)">${wins}W</span> / <em>${losses} L/BE</em></span>
        <span class="bt-run-noted">${notedStr}</span>
      </div>
      <div class="bt-trades-container" id="rt-${r.id}">
        ${isOpen ? renderRunTrades(r.id) : '<div class="bt-trades-empty">Loading…</div>'}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderRunTrades(runId) {
  const trades = runTradeCache[runId];
  if (!trades) return '<div class="bt-trades-empty">Loading…</div>';
  if (!trades.length) return '<div class="bt-trades-empty">No trades recorded for this run.</div>';

  const wins   = trades.filter(t => t.outcome === 'WIN').length;
  const losses = trades.filter(t => t.outcome === 'LOSS').length;
  const be     = trades.filter(t => t.outcome === 'BE').length;
  const header = `<div style="font-size:10px;color:var(--text-muted);padding:6px 12px 4px;display:flex;gap:14px;">
    <span style="color:var(--green)">▲ ${wins} WIN</span>
    <span style="color:var(--red)">▼ ${losses} LOSS</span>
    <span style="color:var(--yellow)">${be} BE</span>
    <span style="margin-left:auto;font-family:var(--font-mono)">Entry / SL / TP1</span>
  </div>`;

  // Per-strategy breakdown table
  const STRAT_ORDER = ['MNQ Intraday', 'MNQ Swing', 'MNQ 50-Point', 'MGC Scalp', 'MGC Intraday'];
  const byStrat = {};
  for (const t of trades) {
    const sn = t.setup || t.strategy_name || 'Unknown';
    if (!byStrat[sn]) byStrat[sn] = { wins: 0, losses: 0, be: 0 };
    if (t.outcome === 'WIN')  byStrat[sn].wins++;
    else if (t.outcome === 'LOSS') byStrat[sn].losses++;
    else byStrat[sn].be++;
  }
  const stratEntries = [
    ...STRAT_ORDER.filter(k => byStrat[k]),
    ...Object.keys(byStrat).filter(k => !STRAT_ORDER.includes(k)),
  ].map(name => ({ name, ...byStrat[name] }));

  const stratRows = stratEntries.map(s => {
    const tot  = s.wins + s.losses + s.be;
    const wr   = tot > 0 ? (s.wins / tot * 100).toFixed(0) : null;
    const wrColor = wr == null ? 'var(--text-muted)' : +wr >= 55 ? 'var(--green)' : +wr >= 45 ? 'var(--yellow)' : 'var(--red)';
    const wrText  = wr != null ? `${wr}%` : '—';
    return `<div style="display:contents">
      <span style="color:rgba(255,255,255,.75);font-weight:500">${escH(name)}</span>
      <span style="color:var(--text-muted);text-align:right">${tot}</span>
      <span style="color:${wrColor};font-weight:600;text-align:right">${wrText}</span>
      <span style="text-align:right"><span style="color:var(--green)">${s.wins}W</span><span style="color:rgba(255,255,255,.3)"> / </span><span style="color:var(--red)">${s.losses}L</span>${s.be ? `<span style="color:rgba(255,255,255,.3)"> / </span><span style="color:var(--yellow)">${s.be}BE</span>` : ''}</span>
    </div>`;
  }).join('');

  const stratHeader = `<div style="padding:8px 12px 6px;border-bottom:1px solid rgba(255,255,255,.08);">
    <div style="font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px">By Strategy</div>
    <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:2px 12px;font-size:11px;font-family:var(--font-mono)">
      <span style="color:rgba(255,255,255,.3);font-size:9px">STRATEGY</span>
      <span style="color:rgba(255,255,255,.3);font-size:9px;text-align:right">TRADES</span>
      <span style="color:rgba(255,255,255,.3);font-size:9px;text-align:right">WIN%</span>
      <span style="color:rgba(255,255,255,.3);font-size:9px;text-align:right">W / L</span>
      ${stratRows}
    </div>
  </div>`;

  return stratHeader + header + trades.map(t => {
    const timeStr = t.timestamp ? hhmm(t.timestamp) : (t.bar_idx != null ? '#' + t.bar_idx : '—');
    const entryStr = t.entry != null ? t.entry.toFixed(2) : '—';
    const slStr    = t.sl    != null ? t.sl.toFixed(2)    : '—';
    const tp1Str   = t.tp1   != null ? t.tp1.toFixed(2)   : '—';
    const isWin    = t.outcome === 'WIN';
    const notePlaceholder = isWin
      ? 'note about this win (optional)…'
      : 'what went wrong? improvement needed?';
    return `<div class="bt-trade-row ${isWin ? 'bt-trade-win' : ''}" id="bt-${t.id}">
      <span class="bt-t-time">${timeStr}</span>
      <span class="bt-t-dir ${t.direction === 'LONG' ? 'long' : 'short'}">${t.direction === 'LONG' ? '▲' : '▼'}</span>
      <span class="bt-t-setup">${escH(t.setup || t.strategy_name || '—')}</span>
      <span class="bt-t-regime">${t.regime || ''}</span>
      <span class="bt-t-score">${t.score != null ? t.score : '—'}</span>
      <span class="bt-t-outcome ${t.outcome}">${t.outcome}</span>
      <span class="bt-t-levels" title="Entry / SL / TP1">${entryStr} <span style="color:var(--text-muted)">SL</span> ${slStr} <span style="color:var(--text-muted)">TP</span> ${tp1Str}</span>
      <div class="bt-t-note">
        <input type="text" class="bt-t-note-input"
               id="bnt-${t.id}"
               value="${escH(t.note || '')}"
               placeholder="${notePlaceholder}"
               onfocus="showTags(${t.id})"
               onblur="scheduleSaveBt(${t.id})" />
        <div class="bt-t-tags" id="tags-${t.id}">
          <button class="tag-chip htf"    onmousedown="insertTag(${t.id},'[HTF]')">HTF bias</button>
          <button class="tag-chip ote"    onmousedown="insertTag(${t.id},'[OTE]')">OTE zone</button>
          <button class="tag-chip chop"   onmousedown="insertTag(${t.id},'[CHOP]')">chop/range</button>
          <button class="tag-chip score"  onmousedown="insertTag(${t.id},'[SCORE]')">low score</button>
          <button class="tag-chip timing" onmousedown="insertTag(${t.id},'[TIMING]')">timing</button>
          <button class="tag-chip regime" onmousedown="insertTag(${t.id},'[REGIME]')">wrong regime</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleRun(runId) {
  if (expandedRuns.has(runId)) {
    expandedRuns.delete(runId);
    document.getElementById('run-' + runId)?.classList.remove('open');
    return;
  }
  expandedRuns.add(runId);
  document.getElementById('run-' + runId)?.classList.add('open');
  const tradesEl = document.getElementById('rt-' + runId);
  if (!runTradeCache[runId]) {
    try {
      const res = await fetch('/api/journal/backtest/' + runId + '/trades');
      runTradeCache[runId] = await res.json();
    } catch { runTradeCache[runId] = []; }
  }
  if (tradesEl) tradesEl.innerHTML = renderRunTrades(runId);
  // Refresh only the stats bar so aggregate per-strategy WR updates
  updateBtStats();
}

function showTags(tradeId) {
  const tags = document.getElementById('tags-' + tradeId);
  if (tags) tags.style.display = 'flex';
}

function insertTag(tradeId, tag) {
  const inp = document.getElementById('bnt-' + tradeId);
  if (!inp) return;
  const cur = inp.value;
  inp.value = cur ? (cur.endsWith(' ') ? cur + tag : cur + ' ' + tag) : tag;
  inp.focus();
}

function scheduleSaveBt(tradeId) {
  setTimeout(() => {
    const tags = document.getElementById('tags-' + tradeId);
    if (tags) tags.style.display = '';
  }, 200);
  clearTimeout(saveTimers['b' + tradeId]);
  saveTimers['b' + tradeId] = setTimeout(() => saveBtNote(tradeId), 500);
}

async function saveBtNote(tradeId) {
  const inp = document.getElementById('bnt-' + tradeId);
  if (!inp) return;
  const note = inp.value.trim();
  for (const trades of Object.values(runTradeCache)) {
    const t = trades.find(x => x.id === tradeId);
    if (t) { t.note = note; break; }
  }
  await fetch('/api/journal/backtest-note', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trade_id: tradeId, note }),
  });
  if (inp) {
    inp.style.borderBottomColor = 'var(--green)';
    setTimeout(() => { inp.style.borderBottomColor = ''; }, 900);
  }
  refreshNotedCounts();
}

function refreshNotedCounts() {
  for (const [runId, trades] of Object.entries(runTradeCache)) {
    const run = btRuns.find(r => r.id === Number(runId));
    if (run) {
      run.noted_count = trades.filter(t => t.note && t.note.trim()).length;
      run.win_count   = trades.filter(t => t.outcome === 'WIN').length;
      run.loss_count  = trades.filter(t => t.outcome === 'LOSS' || t.outcome === 'BE').length;
    }
  }
  for (const r of btRuns) {
    const notedEl = document.querySelector(`#run-${r.id} .bt-run-noted`);
    if (!notedEl) continue;
    const losses = r.loss_count || 0;
    notedEl.innerHTML = r.noted_count > 0
      ? `<b>${r.noted_count}</b>/${losses} noted`
      : losses > 0 ? `${losses} not noted` : 'no losses';
  }
}

// ── Compose ────────────────────────────────────────────────────────────────────
function setType(t, btn) {
  composeType = t;
  document.querySelectorAll('#typeChips .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addTag(tag) {
  const inp = document.getElementById('composeTags');
  if (!inp) return;
  const cur = inp.value.trim();
  const tagLabel = tag.replace(/^\[|\]$/g, '').toLowerCase();
  inp.value = cur ? (cur.endsWith(',') ? cur + ' ' + tagLabel : cur + ', ' + tagLabel) : tagLabel;
}

async function saveEntry() {
  const body = document.getElementById('composeBody')?.value?.trim();
  const tags = document.getElementById('composeTags')?.value?.trim();
  if (!body) { document.getElementById('composeBody')?.focus(); return; }
  await fetch('/api/journal/entries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ entry_type: composeType, body, tags: tags || '' }),
  });
  document.getElementById('composeBody').value = '';
  document.getElementById('composeTags').value = '';
  const flash = document.getElementById('composeSaved');
  if (flash) {
    flash.textContent = '✓ Entry saved';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 2000);
  }
  await loadEntries();
}

async function deleteEntry(id) {
  await fetch('/api/journal/entries/' + id, { method: 'DELETE' });
  journalEntries = journalEntries.filter(e => e.id !== id);
  renderEntries();
}

function renderEntries() {
  const el = document.getElementById('entriesFeed');
  if (!el) return;
  if (!journalEntries.length) {
    el.innerHTML = buildEmptyState('◎', 'No entries yet', 'Use the composer above to write observations, lessons, and plans.');
    return;
  }
  const typeColors = { observation: 'var(--blue)', lesson: 'var(--green)', plan: 'var(--purple)', risk: 'var(--red)', review: 'var(--yellow)' };
  el.innerHTML = journalEntries.map(e => {
    const color = typeColors[e.entry_type] || 'var(--text-muted)';
    const tagsHtml = e.tags ? e.tags.split(',').map(t => t.trim()).filter(Boolean).map(t =>
      `<span style="font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border-subtle);color:var(--text-muted);">${escH(t)}</span>`
    ).join('') : '';
    return `<div class="card" style="margin-bottom:8px;position:relative;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></span>
        <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:capitalize;">${escH(e.entry_type)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-left:auto;">${timeAgo(e.created_at)}</span>
        <button onclick="deleteEntry(${e.id})"
          style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;"
          title="Delete entry">×</button>
      </div>
      <div style="font-size:13px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;">${escH(e.body)}</div>
      ${tagsHtml ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;">${tagsHtml}</div>` : ''}
    </div>`;
  }).join('');
}

async function loadEntries() {
  try {
    const res = await fetch('/api/journal/entries');
    journalEntries = await res.json();
    renderEntries();
  } catch(e) { console.error('loadEntries:', e); }
}

// ── Data loading ───────────────────────────────────────────────────────────────
async function loadReal() {
  try {
    const res  = await fetch('/api/journal/signals?limit=300');
    realSignals = await res.json();
    renderReal();
  } catch(e) { console.error('loadReal:', e); }
}

async function loadBacktest() {
  try {
    const res = await fetch('/api/journal/backtest?limit=40');
    btRuns    = await res.json();
    renderBt();
  } catch(e) { console.error('loadBt:', e); }
}

// ── Weekly Summary ─────────────────────────────────────────────────────────────

function getWeekMonday(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}

async function loadWeeklySummaries() {
  try {
    const res = await fetch('/api/weekly-summary?limit=100');
    weeklySummaries = await res.json();
    populateWeekSelect();
    const sel = document.getElementById('weekSelect');
    if (sel && sel.value) renderWeeklyFeed(sel.value);
    else if (weeklySummaries.length) renderWeeklyFeed(weeklySummaries[0].week_start);
    else document.getElementById('weeklyFeed').innerHTML = buildEmptyState('◎','No summaries yet','Click "Generate This Week" to create the first weekly learning summary.');
  } catch(e) { console.error('loadWeekly:', e); }
}

function populateWeekSelect() {
  const sel = document.getElementById('weekSelect');
  if (!sel) return;
  const weeks = [...new Set(weeklySummaries.map(s => s.week_start))].sort().reverse();
  const curWeek = getWeekMonday();
  if (!weeks.includes(curWeek)) weeks.unshift(curWeek);
  const curVal = sel.value || weeks[0];
  sel.innerHTML = weeks.map(w => {
    const d = new Date(w + 'T12:00:00Z');
    const lbl = 'Week of ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    return `<option value="${w}" ${w === curVal ? 'selected' : ''}>${escH(lbl)}</option>`;
  }).join('');
}

async function loadWeeklySummary(weekStart) {
  renderWeeklyFeed(weekStart);
}

function renderWeeklyFeed(weekStart) {
  const el = document.getElementById('weeklyFeed');
  const rows = weeklySummaries.filter(s => s.week_start === weekStart);
  if (!rows.length) {
    el.innerHTML = buildEmptyState('◎', 'No summary for this week', 'Click "Generate This Week" to generate it.');
    return;
  }

  const d = new Date(weekStart + 'T12:00:00Z');
  const weekLabel = 'Week of ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });

  const stratOrder = ['MNQ_INTRADAY','MNQ_SWING','MNQ_50PT','MGC_SCALP','MGC_INTRADAY'];
  const sorted = [...rows].sort((a, b) => stratOrder.indexOf(a.strategy_key) - stratOrder.indexOf(b.strategy_key));

  const stratColors = {
    MNQ_INTRADAY: 'var(--teal)',
    MNQ_SWING:    'var(--blue)',
    MNQ_50PT:     'var(--purple)',
    MGC_SCALP:    'var(--orange)',
    MGC_INTRADAY: 'var(--yellow)',
  };

  let html = `<div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px;">${escH(weekLabel)}</div>`;
  const genAt = rows[0]?.generated_at;
  if (genAt) html += `<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:16px;">Generated ${timeAgo(genAt)}</div>`;

  for (const s of sorted) {
    const color = stratColors[s.strategy_key] || 'var(--text-muted)';
    const wr = s.win_rate != null ? s.win_rate.toFixed(1) + '%' : '—';
    const wrColor = s.win_rate == null ? 'var(--text-muted)' : s.win_rate >= 55 ? 'var(--green)' : s.win_rate >= 45 ? 'var(--yellow)' : 'var(--red)';
    const escalBadge = s.escalated
      ? `<span style="margin-left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--red-glow);color:var(--red);border:1px solid var(--red-border);">ESCALATED</span>`
      : (s.prior_repeats > 0 ? `<span style="margin-left:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--yellow-glow);color:var(--yellow);border:1px solid var(--yellow-border);">REPEAT ×${s.prior_repeats}</span>` : '');

    const sectionHtml = (title, content, accentColor) => {
      if (!content) return '';
      const lines = content.split('\n').filter(Boolean);
      const linesHtml = lines.map(l => {
        const colonIdx = l.indexOf(':');
        if (colonIdx > 0 && colonIdx < 40) {
          const key = l.slice(0, colonIdx);
          const val = l.slice(colonIdx + 1).trim();
          const keyColor = key.startsWith('REPEAT') || key.startsWith('PERSISTENT') || key.startsWith('ESCALATED') ? 'var(--red)'
            : key.startsWith('NO_') || key.startsWith('MAINTAIN') || key.startsWith('WR_IMPROVING') ? 'var(--green)'
            : accentColor;
          return `<div style="margin-bottom:5px;line-height:1.5;font-size:12px;">
            <span style="font-family:var(--font-mono);font-size:10px;font-weight:700;color:${keyColor};margin-right:6px;">[${escH(key)}]</span>
            <span style="color:var(--text-secondary);">${escH(val)}</span>
          </div>`;
        }
        return `<div style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:4px;">${escH(l)}</div>`;
      }).join('');
      return `<div style="margin-top:12px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${accentColor};margin-bottom:6px;">${title}</div>
        ${linesHtml}
      </div>`;
    };

    html += `<div style="background:var(--bg-surface);border:1px solid var(--border-default);border-left:3px solid ${color};border-radius:10px;padding:14px 16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <span style="font-size:13px;font-weight:700;color:${color};">${escH(s.strategy_label)}</span>
        ${escalBadge}
        <span style="flex:1"></span>
        <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${wrColor};">${wr} WR</span>
        <span style="font-size:10px;color:var(--text-muted);">${s.total_signals} signals · ${s.wins}W/${s.losses}L/${s.breakevens}BE</span>
      </div>
      ${sectionHtml('Performance Review', s.performance_review, 'var(--teal)')}
      ${sectionHtml('Failure Analysis',   s.failure_analysis,   'var(--red)')}
      ${sectionHtml('Corrective Actions', s.corrective_actions, 'var(--yellow)')}
      ${sectionHtml('Pattern Tracking',   s.pattern_tracking,   'var(--purple)')}
    </div>`;
  }

  el.innerHTML = html;
}

async function generateWeeklySummary() {
  const btn = document.getElementById('genBtn');
  if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }
  try {
    const weekStart = document.getElementById('weekSelect')?.value || getWeekMonday();
    const res = await fetch('/api/weekly-summary/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_start: weekStart }),
    });
    const d = await res.json();
    if (d.ok) {
      await loadWeeklySummaries();
      renderWeeklyFeed(weekStart);
    }
  } catch(e) { console.error('generate weekly:', e); }
  finally {
    if (btn) { btn.textContent = '↻ Generate This Week'; btn.disabled = false; }
  }
}

async function refresh() {
  await loadReal();
  if (activeSection === 'bt') await loadBacktest();
  if (activeSection === 'weekly') await loadWeeklySummaries();
  document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 60_000);
initUserMenu();
</script>
