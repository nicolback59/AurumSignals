<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Signals — Intelligence Reports</title>
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100dvh; }

    .reports-layout {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid rgba(220,200,170,.08);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: none;
      border: none;
      color: rgba(237,231,217,.4);
      font: 600 13px/1 var(--font-ui, sans-serif);
      letter-spacing: .04em;
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: rgba(237,231,217,.75); }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent, #c8902a); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Report block ── */
    .report-card {
      background: rgba(220,200,170,.03);
      border: 1px solid rgba(220,200,170,.08);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .report-card h3 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent, #c8902a);
    }
    .report-pre {
      font: 12px/1.65 var(--font-mono, monospace);
      color: rgba(237,231,217,.82);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }
    .report-pre .hi-green  { color: #2e9e6a; }
    .report-pre .hi-red    { color: #a03838; }
    .report-pre .hi-yellow { color: #c8902a; }
    .report-pre .hi-blue   { color: #5a8a9e; }
    .report-pre .hi-purple { color: #9a7a5a; }

    /* ── Section grids ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .metric-box {
      background: rgba(220,200,170,.04);
      border: 1px solid rgba(220,200,170,.07);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .metric-box .lbl {
      font: 600 10px/1 var(--font-mono, monospace);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .metric-box .val {
      font: 700 20px/1 var(--font-display, sans-serif);
      color: var(--text-primary);
    }
    .metric-box .val.green  { color: #2e9e6a; }
    .metric-box .val.red    { color: #a03838; }
    .metric-box .val.yellow { color: #c8902a; }

    /* ── Session table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font: 12px/1.5 var(--font-ui, sans-serif);
      color: rgba(237,231,217,.82);
    }
    .data-table th {
      text-align: left;
      font-size: 10px;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(220,200,170,.08);
      padding: 6px 10px;
    }
    .data-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(220,200,170,.05);
    }
    .data-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
    }
    .badge-green  { background: rgba(46,158,106,.12);  color: #2e9e6a; }
    .badge-red    { background: rgba(160,56,56,.12);   color: #a03838; }
    .badge-yellow { background: rgba(200,144,42,.12);  color: #c8902a; }
    .badge-gray   { background: rgba(220,200,170,.08); color: rgba(237,231,217,.5); }
    .badge-purple { background: rgba(154,122,90,.12);  color: #9a7a5a; }

    /* ── Controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .week-picker {
      background: rgba(220,200,170,.05);
      border: 1px solid rgba(220,200,170,.12);
      border-radius: 6px;
      color: var(--text-primary);
      font: 13px var(--font-mono, monospace);
      padding: 7px 12px;
    }
    .btn-sm {
      background: rgba(200,144,42,.15);
      border: 1px solid rgba(200,144,42,.3);
      border-radius: 6px;
      color: #c8902a;
      font: 600 12px var(--font-ui, sans-serif);
      padding: 7px 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-sm:hover { background: rgba(200,144,42,.25); }

    .loading-msg { color: rgba(237,231,217,.35); font: 13px var(--font-ui, sans-serif); padding: 24px 0; }
    .error-msg   { color: #a03838; font: 13px var(--font-ui, sans-serif); padding: 24px 0; }

    .divider { border: none; border-top: 1px solid rgba(220,200,170,.07); margin: 20px 0; }

    /* ── Opening candle viz ── */
    .oc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .oc-box {
      background: rgba(220,200,170,.03);
      border: 1px solid rgba(220,200,170,.07);
      border-radius: 8px;
      padding: 14px;
    }
    .oc-box .oc-session { font: 700 11px var(--font-mono, monospace); letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .oc-box .oc-bias    { font: 700 15px var(--font-display, sans-serif); margin-bottom: 6px; }
    .oc-box .oc-stats   { font: 12px var(--font-mono, monospace); color: var(--text-secondary); }
    .bull  { color: #2e9e6a; }
    .bear  { color: #a03838; }
    .neut  { color: rgba(237,231,217,.4); }
  </style>
</head>
<body>

<!-- ── TOP NAV ──────────────────────────────────────── -->
<header class="top-nav">
  <div class="top-nav-left">
    <a href="/" class="logo">AURUM <span class="logo-accent">SIGNALS</span></a>
    <nav class="nav-links">
      <a href="/"         class="nav-link">Home</a>
      <a href="/signals"  class="nav-link">Signals</a>
      <a href="/trades"   class="nav-link">Trades</a>
      <a href="/stats"    class="nav-link">Stats</a>
      <a href="/calendar" class="nav-link">Calendar</a>
      <a href="/backtest" class="nav-link">Backtest</a>
      <a href="/journal"  class="nav-link">Journal</a>
      <a href="/reports"  class="nav-link active">Reports</a>
      <a href="/news"     class="nav-link">News</a>
      <a href="/setup"    class="nav-link">Setup</a>
    </nav>
  </div>
  <div class="top-nav-right">
    <span class="refresh-label" id="refreshLbl">—</span>
    <div id="navUser"></div>
  </div>
</header>


<!-- ── MAIN ──────────────────────────────────────────── -->
<div class="reports-layout">

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="midweek">Mid-Week Report</button>
    <button class="tab-btn"        data-tab="weekly">Weekly Deep Dive</button>
    <button class="tab-btn"        data-tab="opening">Opening Candle Bias</button>
    <button class="tab-btn"        data-tab="edge">Edge Health</button>
  </div>

  <!-- ── MID-WEEK ─────────────────────────────────────── -->
  <div class="tab-panel active" id="tab-midweek">
    <div class="controls-row">
      <button class="btn-sm" id="btnForceMidweek">⟳ Regenerate</button>
      <span style="color:rgba(237,231,217,.35);font:12px monospace" id="midweekMeta">—</span>
    </div>
    <div id="midweekContent"><p class="loading-msg">Loading mid-week report…</p></div>
  </div>

  <!-- ── WEEKLY DEEP ────────────────────────────────────── -->
  <div class="tab-panel" id="tab-weekly">
    <div class="controls-row">
      <label style="color:rgba(237,231,217,.4);font:12px var(--font-ui,sans-serif)">Week of:</label>
      <input type="date" class="week-picker" id="weekPicker">
      <button class="btn-sm" id="btnLoadWeekly">Load</button>
      <button class="btn-sm" id="btnGenWeeklyTop" onclick="generateWeeklySummary()">Generate Learning</button>
      <span style="color:rgba(237,231,217,.35);font:12px monospace" id="weeklyMeta">—</span>
    </div>
    <div id="weeklyContent"><p class="loading-msg">Select a week and click Load.</p></div>
  </div>

  <!-- ── OPENING CANDLE ─────────────────────────────────── -->
  <div class="tab-panel" id="tab-opening">
    <div class="controls-row">
      <button class="btn-sm" id="btnRefreshOC">⟳ Refresh</button>
      <span style="color:rgba(237,231,217,.35);font:12px monospace" id="ocMeta">—</span>
    </div>
    <div id="ocContent"><p class="loading-msg">Loading opening candle data…</p></div>
  </div>

  <!-- ── EDGE HEALTH ────────────────────────────────────── -->
  <div class="tab-panel" id="tab-edge">
    <div class="controls-row">
      <button class="btn-sm" id="btnRefreshEdge">⟳ Refresh</button>
      <span style="color:rgba(237,231,217,.35);font:12px monospace" id="edgeMeta">—</span>
    </div>
    <div id="edgeContent"><p class="loading-msg">Loading edge health…</p></div>
  </div>

</div><!-- /.reports-layout -->

<script>
'use strict';

// ── Tab switching ─────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Helpers ───────────────────────────────────────────
const pct  = v => v != null ? (v * 100).toFixed(1) + '%' : '—';
const fix2  = v => v != null ? (+v).toFixed(2) : '—';
const fmtTs = ts => ts ? new Date(ts).toLocaleString() : '—';

function colorWR(wr) {
  if (wr == null) return 'inherit';
  if (wr >= 0.65) return '#2e9e6a';
  if (wr >= 0.55) return '#c8902a';
  return '#a03838';
}
function badgeWR(wr) {
  if (wr == null) return `<span class="badge badge-gray">—</span>`;
  const cls = wr >= 0.65 ? 'badge-green' : wr >= 0.55 ? 'badge-yellow' : 'badge-red';
  return `<span class="badge ${cls}">${pct(wr)}</span>`;
}
function biasColor(bias) {
  if (!bias) return 'neut';
  if (bias.includes('BULL')) return 'bull';
  if (bias.includes('BEAR')) return 'bear';
  return 'neut';
}

// ── Mid-week report ───────────────────────────────────
async function loadMidweek(force = false) {
  document.getElementById('midweekContent').innerHTML = '<p class="loading-msg">Loading…</p>';
  try {
    const r = await fetch('/api/performance/midweek-report' + (force ? '?force=1' : ''));
    const d = await r.json();
    if (d.error) { document.getElementById('midweekContent').innerHTML = `<p class="error-msg">${d.error}</p>`; return; }
    document.getElementById('midweekMeta').textContent =
      `Generated: ${fmtTs(d.generated_at)} | Week: ${d.week_start ?? '—'}`;
    document.getElementById('midweekContent').innerHTML = renderMidweek(d);
  } catch(e) {
    document.getElementById('midweekContent').innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
  }
}

function renderMidweek(d) {
  const m = d.metrics || {};
  const sections = [];

  // Summary metrics grid
  const wr  = m.win_rate_pct != null ? m.win_rate_pct / 100 : null;
  const pf  = m.profit_factor;
  const exp = m.expectancy_pts;
  const n   = m.total_trades;
  const pnl = m.total_pnl;
  const conf = m.avg_confidence;
  sections.push(`<div class="metrics-grid">
    ${metric('Win Rate',      wr != null ? m.win_rate_pct.toFixed(1) + '%' : '—', wr >= .65 ? 'green' : wr >= .55 ? 'yellow' : 'red')}
    ${metric('Profit Factor', fix2(pf),  pf >= 1.5 ? 'green' : pf >= 1.0 ? 'yellow' : 'red')}
    ${metric('Expectancy',    exp != null ? fix2(exp) + ' pts' : '—', exp >= 0 ? 'green' : 'red')}
    ${metric('Trades',        n ?? '—')}
    ${metric('Total PnL',     pnl != null ? (pnl > 0 ? '+' : '') + fix2(pnl) + ' pts' : '—', pnl > 0 ? 'green' : pnl < 0 ? 'red' : '')}
    ${metric('Avg Confidence', conf != null ? conf : '—')}
  </div>`);

  // Narrative text
  if (d.narrative) {
    sections.push(`<div class="report-card"><pre class="report-pre">${highlightText(d.narrative)}</pre></div>`);
  }

  // Strategy breakdown
  if (d.breakdowns?.byStrategy?.length) {
    sections.push(renderStrategyTable(d.breakdowns.byStrategy));
  }

  // Session breakdown
  if (d.breakdowns?.bySession?.length) {
    sections.push(renderSessionTable(d.breakdowns.bySession));
  }

  // Warnings
  if (d.warnings?.length) {
    sections.push(`<div class="report-card">
      <h3>Warnings</h3>
      ${d.warnings.map(w => `<div style="color:#c8902a;font:12px var(--font-ui,sans-serif);margin-bottom:6px">• ${w}</div>`).join('')}
    </div>`);
  }

  // Recommendations
  if (d.recommendations?.length) {
    sections.push(`<div class="report-card">
      <h3>Recommendations</h3>
      ${d.recommendations.map(w => `<div style="color:#9a7a5a;font:12px var(--font-ui,sans-serif);margin-bottom:6px">→ ${w}</div>`).join('')}
    </div>`);
  }

  return sections.join('') || `<div class="report-card"><pre class="report-pre">${JSON.stringify(d, null, 2)}</pre></div>`;
}

// ── Weekly deep report ────────────────────────────────
// Default picker to Monday of current week
(function initWeekPicker() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  document.getElementById('weekPicker').value = d.toISOString().slice(0, 10);
})();

let weeklySummaries = [];

async function loadWeekly() {
  const week = document.getElementById('weekPicker').value;
  if (!week) return;
  document.getElementById('weeklyContent').innerHTML = '<p class="loading-msg">Loading…</p>';
  try {
    const [deepRes, summaryRes] = await Promise.all([
      fetch(`/api/performance/weekly-deep?week=${week}`),
      fetch(`/api/weekly-summary?limit=100`),
    ]);
    const d  = await deepRes.json();
    const ws = await summaryRes.json();
    weeklySummaries = Array.isArray(ws) ? ws : [];

    if (d.error) {
      document.getElementById('weeklyContent').innerHTML =
        `<p class="error-msg">${d.error}</p><p style="color:rgba(237,231,217,.4);font:12px var(--font-ui,sans-serif);margin-top:8px">Click <b>Generate Learning</b> to build data for this week.</p>`;
      return;
    }
    document.getElementById('weeklyMeta').textContent = `Week: ${d.week_start ?? week} | Generated: ${fmtTs(d.generated_at)}`;
    document.getElementById('weeklyContent').innerHTML = renderWeekly(d, week);
  } catch(e) {
    document.getElementById('weeklyContent').innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
  }
}

async function generateWeeklySummary() {
  const week = document.getElementById('weekPicker').value || getWeekMonday();
  // Collect all generate buttons (top + inline) so all show loading state
  const btns = ['btnGenWeeklyTop','btnGenWeekly','btnGenWeeklyInline']
    .map(id => document.getElementById(id)).filter(Boolean);
  const meta = document.getElementById('weeklyMeta');
  btns.forEach(b => { b.textContent = 'Generating…'; b.disabled = true; });
  if (meta) meta.textContent = 'Generating learning data…';
  try {
    const res = await fetch('/api/weekly-summary/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_start: week }),
    });
    const d = await res.json();
    if (d.error) {
      if (meta) meta.textContent = `Error: ${d.error}`;
      document.getElementById('weeklyContent').innerHTML = `<p class="error-msg">Generate failed: ${d.error}</p>`;
    } else {
      if (meta) meta.textContent = `Generated ${d.count ?? ''} strategies for ${week}`;
      await loadWeekly();
    }
  } catch(e) {
    console.error('generate weekly:', e);
    if (meta) meta.textContent = `Error: ${e.message}`;
  } finally {
    btns.forEach(b => { b.textContent = 'Generate Learning'; b.disabled = false; });
  }
}

function getWeekMonday(date = new Date()) {
  const d   = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d.toISOString().slice(0, 10);
}

function renderWeekly(d, weekFilter) {
  const m = d.metrics || {};
  const sections = [];

  // Summary metrics grid
  const wr     = m.win_rate_pct != null ? m.win_rate_pct / 100 : null;
  const pf     = m.profit_factor;
  const exp    = m.expectancy_pts;
  const n      = m.total_trades;
  const pnl    = m.total_pnl;
  const delta  = m.wr_delta_pct;
  const conf   = m.avg_confidence;
  const dd     = m.max_drawdown_pts;
  const rf     = m.recovery_factor;

  sections.push(`<div class="metrics-grid">
    ${metric('Win Rate',       wr != null ? m.win_rate_pct.toFixed(1) + '%' : '—', wr >= .65 ? 'green' : wr >= .55 ? 'yellow' : 'red')}
    ${metric('Profit Factor',  fix2(pf), pf >= 1.5 ? 'green' : pf >= 1.0 ? 'yellow' : 'red')}
    ${metric('Expectancy',     exp != null ? fix2(exp) + ' pts' : '—', exp >= 0 ? 'green' : 'red')}
    ${metric('Trades',         n ?? '—')}
    ${metric('Total PnL',      pnl != null ? (pnl > 0 ? '+' : '') + fix2(pnl) + ' pts' : '—', pnl > 0 ? 'green' : pnl < 0 ? 'red' : '')}
    ${metric('WoW WR Delta',   delta != null ? (delta > 0 ? '+' : '') + delta.toFixed(1) + '%' : '—', delta > 0 ? 'green' : delta < 0 ? 'red' : '')}
    ${metric('Max Drawdown',   dd != null ? fix2(dd) + ' pts' : '—')}
    ${metric('Avg Confidence', conf != null ? conf : '—')}
  </div>`);

  // Narrative
  if (d.narrative) {
    sections.push(`<div class="report-card"><pre class="report-pre">${highlightText(d.narrative)}</pre></div>`);
  }

  // Strategy + session breakdowns
  if (d.breakdowns?.byStrategy?.length) sections.push(renderStrategyTable(d.breakdowns.byStrategy));
  if (d.breakdowns?.bySession?.length)  sections.push(renderSessionTable(d.breakdowns.bySession));

  // Edge strengths / weaknesses
  const es = d.edge_strengths;
  if (es?.strengths?.length || es?.weaknesses?.length) {
    const strengthRows = (es.strengths ?? []).map(s =>
      `<div style="color:#2e9e6a;font:12px var(--font-ui,sans-serif);margin-bottom:5px">+ ${s.label} — WR ${(s.wr * 100).toFixed(0)}% (${s.n} trades)</div>`).join('');
    const weakRows = (es.weaknesses ?? []).map(s =>
      `<div style="color:#a03838;font:12px var(--font-ui,sans-serif);margin-bottom:5px">- ${s.label} — WR ${(s.wr * 100).toFixed(0)}% (${s.n} trades)</div>`).join('');
    if (strengthRows || weakRows) {
      sections.push(`<div class="report-card">
        ${strengthRows ? `<h3>Edge Strengths</h3>${strengthRows}` : ''}
        ${weakRows ? `<h3 style="margin-top:${strengthRows ? '14px' : '0'}">Edge Weaknesses</h3>${weakRows}` : ''}
      </div>`);
    }
  }

  // ── Learning summaries (journal integration) ──────
  const learningRows = weeklySummaries.filter(s => s.week_start === (weekFilter ?? getWeekMonday()));
  if (learningRows.length) {
    sections.push(renderLearningCards(learningRows));
  } else {
    sections.push(`<div class="report-card">
      <h3>Strategy Learning Summary</h3>
      <p style="color:rgba(237,231,217,.35);font:12px var(--font-ui,sans-serif);margin:0">No learning summary for this week.
        <button class="btn-sm" id="btnGenWeeklyInline" onclick="generateWeeklySummary()" style="margin-left:12px">Generate</button>
      </p>
    </div>`);
  }

  return sections.join('');
}

function renderLearningCards(rows) {
  const stratOrder = ['MNQ_INTRADAY','MNQ_SWING','MNQ_50PT','MGC_SCALP','MGC_INTRADAY'];
  const stratColors = { MNQ_INTRADAY:'#2e9e6a', MNQ_SWING:'#d4982e', MNQ_50PT:'#9a7a5a', MGC_SCALP:'#b07828', MGC_INTRADAY:'#c8902a' };
  const sorted = [...rows].sort((a, b) => stratOrder.indexOf(a.strategy_key) - stratOrder.indexOf(b.strategy_key));

  const cards = sorted.map(s => {
    const color  = stratColors[s.strategy_key] || 'rgba(237,231,217,.4)';
    const wr     = s.win_rate != null ? s.win_rate.toFixed(1) + '%' : '—';
    const wrColor = s.win_rate == null ? 'rgba(237,231,217,.4)' : s.win_rate >= 55 ? '#2e9e6a' : s.win_rate >= 45 ? '#c8902a' : '#a03838';

    const sectionBlock = (title, content, accent) => {
      if (!content) return '';
      const lines = content.split('\n').filter(Boolean);
      const linesHtml = lines.map(l => {
        const ci = l.indexOf(':');
        if (ci > 0 && ci < 40) {
          const key = l.slice(0, ci), val = l.slice(ci + 1).trim();
          const kc = key.startsWith('REPEAT') || key.startsWith('ESCALATED') ? '#a03838' : key.startsWith('NO_') || key.startsWith('MAINTAIN') ? '#2e9e6a' : accent;
          return `<div style="margin-bottom:5px;font-size:12px;line-height:1.5">
            <span style="font:700 10px monospace;color:${kc};margin-right:6px">[${escH(key)}]</span>
            <span style="color:rgba(237,231,217,.75)">${escH(val)}</span>
          </div>`;
        }
        return `<div style="font-size:12px;color:rgba(237,231,217,.65);line-height:1.5;margin-bottom:4px">${escH(l)}</div>`;
      }).join('');
      return `<div style="margin-top:12px">
        <div style="font:700 10px monospace;letter-spacing:.08em;text-transform:uppercase;color:${accent};margin-bottom:6px">${title}</div>
        ${linesHtml}
      </div>`;
    };

    const escalBadge = s.escalated
      ? `<span class="badge badge-red" style="margin-left:8px">ESCALATED</span>`
      : s.prior_repeats > 0 ? `<span class="badge badge-yellow" style="margin-left:8px">REPEAT x${s.prior_repeats}</span>` : '';

    return `<div style="border-left:3px solid ${color};background:rgba(220,200,170,.03);border-radius:8px;border:1px solid rgba(220,200,170,.08);border-left-width:3px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <span style="font:700 13px sans-serif;color:${color}">${escH(s.strategy_label ?? s.strategy_key)}</span>
        ${escalBadge}
        <span style="flex:1"></span>
        <span style="font:700 11px monospace;color:${wrColor}">${wr} WR</span>
        <span style="font:10px var(--font-mono,monospace);color:rgba(237,231,217,.4)">${s.total_signals} signals · ${s.wins}W/${s.losses}L/${s.breakevens}BE</span>
      </div>
      ${sectionBlock('Performance Review', s.performance_review, '#2e9e6a')}
      ${sectionBlock('Failure Analysis',   s.failure_analysis,   '#a03838')}
      ${sectionBlock('Corrective Actions', s.corrective_actions, '#c8902a')}
      ${sectionBlock('Pattern Tracking',   s.pattern_tracking,   '#9a7a5a')}
    </div>`;
  }).join('');

  return `<div class="report-card">
    <h3>Strategy Learning Summary</h3>
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px">
      <button class="btn-sm" id="btnGenWeekly" onclick="generateWeeklySummary()">Regenerate Learning</button>
    </div>
    ${cards}
  </div>`;
}

function escH(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Opening candle ────────────────────────────────────
async function loadOpeningCandle() {
  document.getElementById('ocContent').innerHTML = '<p class="loading-msg">Loading…</p>';
  try {
    const r = await fetch('/api/opening-candle/status');
    const d = await r.json();
    document.getElementById('ocMeta').textContent = `Generated: ${fmtTs(d.generated_at)}`;
    document.getElementById('ocContent').innerHTML = renderOpeningCandle(d);
  } catch(e) {
    document.getElementById('ocContent').innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
  }
}

function renderOpeningCandle(d) {
  const sections = [];

  for (const inst of ['MNQ', 'MGC']) {
    const r = d[inst];
    if (!r) continue;

    // Today's candles
    if (r.todayCandles?.length) {
      const cards = r.todayCandles.map(c => {
        const bc = biasColor(c.bias);
        return `<div class="oc-box">
          <div class="oc-session">${c.sessionKey ?? c.key}</div>
          <div class="oc-bias ${bc}">${c.bias ?? '—'} <small style="opacity:.6">str=${(c.strength ?? 0).toFixed(2)}</small></div>
          <div class="oc-stats">${fmtTs(c.timestamp)}</div>
        </div>`;
      }).join('');
      sections.push(`<div class="report-card">
        <h3>${inst} — Today's Session Opens</h3>
        <div class="oc-grid">${cards}</div>
      </div>`);
    } else {
      sections.push(`<div class="report-card"><h3>${inst} — Today's Session Opens</h3><p style="color:rgba(237,231,217,.35);font:12px monospace">No opening candles recorded yet today.</p></div>`);
    }

    // Historical accuracy table
    if (r.sessionSummary?.length) {
      const rows = r.sessionSummary.map(s => {
        const acc = s.accuracy != null ? s.accuracy + '%' : '—';
        const accColor = s.accuracy >= 60 ? '#2e9e6a' : s.accuracy >= 54 ? '#c8902a' : '#a03838';
        const statusBadge = s.active
          ? `<span class="badge badge-green">ACTIVE</span>`
          : s.total >= r.minSampleSize
            ? `<span class="badge badge-yellow">LOW ACC</span>`
            : `<span class="badge badge-gray">BUILDING</span>`;
        return `<tr>
          <td>${s.sessionKey}</td>
          <td>${s.total}</td>
          <td style="color:${accColor}">${acc}</td>
          <td>${s.wins ?? 0} / ${s.losses ?? 0}</td>
          <td>${statusBadge}</td>
          <td style="color:rgba(237,231,217,.45)">${s.lastUpdated ? new Date(s.lastUpdated).toLocaleDateString() : '—'}</td>
        </tr>`;
      }).join('');
      sections.push(`<div class="report-card">
        <h3>${inst} — Session Bias Accuracy (min ${r.minSampleSize} samples, ${(r.minAccuracyThreshold * 100).toFixed(0)}% threshold)</h3>
        <table class="data-table">
          <thead><tr><th>Session</th><th>Samples</th><th>Accuracy</th><th>W/L</th><th>Status</th><th>Last Updated</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`);
    }
  }

  return sections.join('') || '<p class="loading-msg">No opening candle data yet. Data builds after the first live session.</p>';
}

// ── Edge health ───────────────────────────────────────
async function loadEdgeHealth() {
  document.getElementById('edgeContent').innerHTML = '<p class="loading-msg">Loading…</p>';
  try {
    const r = await fetch('/api/performance/edge-health');
    const d = await r.json();
    document.getElementById('edgeMeta').textContent = `Generated: ${fmtTs(d.generated_at)}`;
    document.getElementById('edgeContent').innerHTML = renderEdgeHealth(d);
  } catch(e) {
    document.getElementById('edgeContent').innerHTML = `<p class="error-msg">Error: ${e.message}</p>`;
  }
}

function renderEdgeHealth(d) {
  const sections = [];
  for (const inst of ['MNQ', 'MGC']) {
    const r = d[inst];
    if (!r) continue;
    const alertColor = r.alert ? '#a03838' : '#2e9e6a';
    const alertLabel = r.alert ? '⚠ DEGRADATION DETECTED' : '✓ EDGE HEALTHY';
    sections.push(`<div class="report-card">
      <h3>${inst} — Edge Status</h3>
      <div style="color:${alertColor};font:700 14px monospace;margin-bottom:14px">${alertLabel}</div>
      ${r.message ? `<div style="color:rgba(237,231,217,.65);font:12px var(--font-ui,sans-serif);margin-bottom:10px">${r.message}</div>` : ''}
      <div class="metrics-grid">
        ${metric('Last 3 Avg WR', r.recentAvgWR != null ? r.recentAvgWR.toFixed(1) + '%' : '—', r.recentAvgWR >= 62 ? 'green' : r.recentAvgWR >= 52 ? 'yellow' : 'red')}
        ${metric('Prior 3 Avg WR', r.priorAvgWR != null ? r.priorAvgWR.toFixed(1) + '%' : '—')}
        ${metric('Delta', r.delta != null ? (r.delta > 0 ? '+' : '') + r.delta.toFixed(1) + '%' : '—', r.delta > 0 ? 'green' : r.delta < -5 ? 'red' : 'yellow')}
      </div>
      ${r.details ? `<pre class="report-pre" style="font-size:11px">${JSON.stringify(r.details, null, 2)}</pre>` : ''}
    </div>`);
  }
  return sections.join('') || '<p class="loading-msg">No edge health data available yet.</p>';
}

// ── Shared render helpers ─────────────────────────────
function metric(label, value, colorClass = '') {
  return `<div class="metric-box">
    <div class="lbl">${label}</div>
    <div class="val ${colorClass}">${value ?? '—'}</div>
  </div>`;
}

function renderStrategyTable(byStrategy) {
  if (!byStrategy?.length) return '';
  const rows = byStrategy.map(s => {
    const wr = s.total > 0 ? s.wins / s.total : null;
    const wrCls = wr == null ? 'badge-gray' : wr >= 0.65 ? 'badge-green' : wr >= 0.55 ? 'badge-yellow' : 'badge-red';
    const wrTxt = wr != null ? (wr * 100).toFixed(1) + '%' : '—';
    const pnlColor = (s.total_pnl ?? 0) >= 0 ? '#2e9e6a' : '#a03838';
    return `<tr>
      <td style="color:#fff;font-weight:700">${s.strategy_name}</td>
      <td style="color:rgba(237,231,217,.55)">${s.instrument ?? '—'}</td>
      <td><span class="badge ${wrCls}">${wrTxt}</span></td>
      <td>${s.total ?? '—'}</td>
      <td>${s.wins ?? 0} / ${s.losses ?? 0}</td>
      <td style="color:${pnlColor}">${s.total_pnl != null ? (s.total_pnl > 0 ? '+' : '') + fix2(s.total_pnl) + ' pts' : '—'}</td>
      <td style="color:rgba(237,231,217,.5)">${s.avg_confidence != null ? (+s.avg_confidence).toFixed(0) : '—'}</td>
    </tr>`;
  }).join('');
  return `<div class="report-card">
    <h3>Strategy Breakdown</h3>
    <table class="data-table">
      <thead><tr><th>Strategy</th><th>Instr.</th><th>Win Rate</th><th>Trades</th><th>W/L</th><th>PnL</th><th>Avg Conf</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderSessionTable(bySession) {
  if (!bySession?.length) return '';
  const rows = bySession.map(s => {
    const wr = s.total > 0 ? s.wins / s.total : null;
    const wrCls = wr == null ? 'badge-gray' : wr >= 0.65 ? 'badge-green' : wr >= 0.55 ? 'badge-yellow' : 'badge-red';
    const wrTxt = wr != null ? (wr * 100).toFixed(1) + '%' : '—';
    const pnlColor = (s.total_pnl ?? 0) >= 0 ? '#2e9e6a' : '#a03838';
    return `<tr>
      <td style="color:#fff">${s.session}</td>
      <td style="color:rgba(237,231,217,.55)">${s.instrument ?? '—'}</td>
      <td><span class="badge ${wrCls}">${wrTxt}</span></td>
      <td>${s.total ?? '—'}</td>
      <td style="color:${pnlColor}">${s.total_pnl != null ? (s.total_pnl > 0 ? '+' : '') + fix2(s.total_pnl) + ' pts' : '—'}</td>
    </tr>`;
  }).join('');
  return `<div class="report-card">
    <h3>Session Breakdown</h3>
    <table class="data-table">
      <thead><tr><th>Session</th><th>Instr.</th><th>Win Rate</th><th>Trades</th><th>PnL</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function highlightText(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(✓[^\n]*)/g, '<span class="hi-green">$1</span>')
    .replace(/(⚠[^\n]*)/g, '<span class="hi-yellow">$1</span>')
    .replace(/(✗[^\n]*)/g, '<span class="hi-red">$1</span>')
    .replace(/(→[^\n]*)/g, '<span class="hi-purple">$1</span>')
    .replace(/(\d+\.\d+%)/g, '<span class="hi-blue">$1</span>');
}

// ── Event bindings ────────────────────────────────────
document.getElementById('btnForceMidweek').addEventListener('click', () => loadMidweek(true));
document.getElementById('btnLoadWeekly').addEventListener('click', loadWeekly);
document.getElementById('btnRefreshOC').addEventListener('click', loadOpeningCandle);
document.getElementById('btnRefreshEdge').addEventListener('click', loadEdgeHealth);

// ── Init ──────────────────────────────────────────────
loadMidweek();
loadOpeningCandle();
loadEdgeHealth();

document.getElementById('refreshLbl').textContent = new Date().toLocaleTimeString();
initUserMenu();
</script>
