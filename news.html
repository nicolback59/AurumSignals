<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NQ Signal Pro — News</title>
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body { overflow-y: auto; }
    .news-wrap { max-width: 860px; margin: 0 auto; padding: 0 16px 88px; }

    /* ── Header ───────────────────────────────────────── */
    .news-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .news-hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
    .news-hdr p  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── No-API banner ────────────────────────────────── */
    .api-notice {
      background: var(--yellow-glow);
      border: 1px solid var(--yellow-border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .api-notice-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .api-notice-body { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .api-notice-body strong { color: var(--yellow); }

    /* ── News card ────────────────────────────────────── */
    .news-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: border-color var(--t), transform var(--t), box-shadow var(--t);
      cursor: default;
    }
    .news-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .news-card-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .news-cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .news-cat-dot.market   { background: var(--blue); }
    .news-cat-dot.analysis { background: var(--green); }
    .news-cat-dot.strategy { background: var(--purple); }
    .news-cat-dot.regime   { background: var(--yellow); }
    .news-source { font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .news-time   { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-left: auto; }
    .news-title  { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; line-height: 1.4; }
    .news-body   { font-size: 11px; color: var(--text-secondary); line-height: 1.6; }
    .news-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .news-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
    }
    .news-market-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .news-market-badge.mnq { background: var(--blue-glow);   color: var(--mnq); border: 1px solid var(--blue-border); }
    .news-market-badge.mgc { background: var(--yellow-glow); color: var(--mgc); border: 1px solid var(--yellow-border); }
    .news-market-badge.all { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border-default); }

    /* ── Empty / loading ──────────────────────────────── */
    .news-section-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 14px 0 8px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .news-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }
  </style>
</head>
<body>

<!-- ── TOP NAV ──────────────────────────────────────── -->
<header class="top-nav">
  <div class="top-nav-left">
    <a href="/" class="logo">NQ <span class="logo-accent">SIGNAL PRO</span> V3</a>
    <nav class="nav-links">
      <a href="/"         class="nav-link">Home</a>
      <a href="/signals"  class="nav-link">Signals</a>
      <a href="/trades"   class="nav-link">Trades</a>
      <a href="/stats"    class="nav-link">Stats</a>
      <a href="/calendar" class="nav-link">Calendar</a>
      <a href="/backtest" class="nav-link">Backtest</a>
      <a href="/journal"  class="nav-link">Journal</a>
      <a href="/reports"  class="nav-link">Reports</a>
      <a href="/news"     class="nav-link active">News</a>
      <a href="/setup"    class="nav-link">Setup</a>
    </nav>
  </div>
  <div class="top-nav-right">
    <span class="refresh-label" id="refreshLbl">—</span>
    <div id="navUser"></div>
  </div>
</header>

<!-- ── CONTENT ───────────────────────────────────────── -->
<div class="news-wrap">

  <!-- Header -->
  <div class="news-hdr">
    <div>
      <h1>Market Intelligence</h1>
      <p>Geopolitical &amp; macro news · refreshes every 30 min</p>
    </div>
    <div class="filter-chips" id="catFilter">
      <button class="filter-chip active"  onclick="setCat('ALL',          this)">All</button>
      <button class="filter-chip"         onclick="setCat('GEOPOLITICAL', this)">Geopolitical</button>
      <button class="filter-chip"         onclick="setCat('MACRO',        this)">Macro</button>
      <button class="filter-chip"         onclick="setCat('MNQ',          this)">MNQ</button>
      <button class="filter-chip"         onclick="setCat('MGC',          this)">MGC</button>
    </div>
  </div>

  <!-- Feed -->
  <div id="newsFeed">
    <div class="skeleton skeleton-card" style="margin-bottom:8px"></div>
    <div class="skeleton skeleton-card" style="margin-bottom:8px"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

</div><!-- /news-wrap -->

<!-- ── BOTTOM NAV (mobile) ───────────────────────────── -->
<nav class="bottom-nav">
  <div class="bottom-nav-items">
    <a href="/" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="bottom-nav-label">Home</span>
    </a>
    <a href="/signals" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
      <span class="bottom-nav-label">Signals</span>
    </a>
    <a href="/trades" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="bottom-nav-label">Trades</span>
    </a>
    <a href="/journal" class="bottom-nav-item">
      <span class="bottom-nav-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>
      <span class="bottom-nav-label">Journal</span>
    </a>
  </div>
</nav>

<script src="/ui-components.js"></script>
<script>
'use strict';

let allItems  = [];
let catFilter = 'ALL';

function setCat(f, btn) {
  catFilter = f;
  document.querySelectorAll('#catFilter .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function card({ cat, dotCls, source, time, title, body, tags, market }) {
  const tagsHtml = (tags || []).map(t => `<span class="news-tag">${escH(t)}</span>`).join('');
  const mktBadge = market
    ? `<span class="news-market-badge ${market.toLowerCase()}">${market}</span>` : '';
  return { cat, html: `<div class="news-card">
    <div class="news-card-hdr">
      <span class="news-cat-dot ${dotCls}"></span>
      <span class="news-source">${escH(source)}</span>
      <span class="news-time">${time}</span>
    </div>
    <div class="news-title">${escH(title)}</div>
    <div class="news-body">${escH(body)}</div>
    <div class="news-footer">${tagsHtml}${mktBadge}</div>
  </div>` };
}

function renderFeed() {
  const el       = document.getElementById('newsFeed');
  const filtered = catFilter === 'ALL' ? allItems : allItems.filter(i => i.cat === catFilter);
  if (!filtered.length) {
    el.innerHTML = buildEmptyState('◈', 'No items in this category', '');
    return;
  }
  el.innerHTML = filtered.map(i => i.html).join('');
}

const CAT_META = {
  GEOPOLITICAL: { dotCls: 'regime',   label: 'Geopolitical' },
  MACRO:        { dotCls: 'analysis', label: 'Macro' },
  MNQ:          { dotCls: 'market',   label: 'MNQ' },
  MGC:          { dotCls: 'strategy', label: 'MGC' },
};

async function load() {
  try {
    const res   = await fetch('/api/news?limit=80');
    const items = await res.json();

    if (!Array.isArray(items) || !items.length) {
      allItems = [];
      renderFeed();
      document.getElementById('newsFeed').innerHTML =
        buildEmptyState('◈', 'No news yet', 'News updates every 30 minutes — check back shortly.');
      return;
    }

    const meta = (cat) => CAT_META[cat] || { dotCls: 'market', label: cat };

    allItems = items.map(item => {
      const m       = meta(item.category);
      const pubTime = item.published_at
        ? timeAgo(new Date(item.published_at).toISOString())
        : timeAgo(item.fetched_at);
      const market = item.category === 'MNQ' ? 'MNQ'
                   : item.category === 'MGC' ? 'MGC' : 'ALL';
      return card({
        cat:    item.category,
        dotCls: m.dotCls,
        source: item.source || 'Google News',
        time:   pubTime,
        title:  item.title,
        body:   item.summary || '',
        tags:   [m.label],
        market,
      });
    });

    renderFeed();
    document.getElementById('refreshLbl').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    document.getElementById('newsFeed').innerHTML =
      buildEmptyState('⚠', 'Failed to load news', e.message);
  }
}

load();
setInterval(load, 30 * 60_000);
initUserMenu();
</script>
</body>
</html>
