services:
  # ── Frontend — serves HTML/CSS/JS and proxies API to Droplet ──────────────────
  # The Droplet runs server.js (scanner + API + DB).
  # This Render service ONLY serves static pages and proxies /api/* to the Droplet.
  # No database, no scanner, no disk mount needed on Render.
  - type: web
    name: aurum-signals-frontend
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: node render-server.js
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

      # ── Backend Droplet URL (REQUIRED — set in Render dashboard) ─────────────
      # Point this to your Digital Ocean droplet, e.g.: http://165.232.1.2:3000
      # If you have a domain pointing to the droplet use that instead.
      - key: DROPLET_URL
        sync: false   # set manually in Render dashboard — never commit the real IP
