<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Aurum Signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/design-system.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(200,144,42,.04) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 62px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10,8,7,.92);
      backdrop-filter: blur(16px);
    }
    .auth-nav-logo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .06em;
      text-decoration: none;
      color: var(--yellow);
    }
    .auth-nav-logo span { color: var(--text-secondary); }
    .auth-nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 7px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color .15s, background .15s;
    }
    .auth-nav-back:hover { color: var(--text-primary); background: var(--border-subtle); }
    .auth-nav-back svg { width: 14px; height: 14px; }

    .auth-wrapper {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px 64px;
    }
    .auth-container { width: 100%; max-width: 420px; }

    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: 13px;
      background: rgba(200,144,42,.10);
      border: 1px solid rgba(200,144,42,.22);
      margin-bottom: 14px;
    }
    .auth-brand-icon svg { width: 22px; height: 22px; color: var(--yellow); }
    .auth-brand-name {
      font-family: var(--font-mono);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--yellow);
    }
    .auth-brand-name span { color: var(--text-secondary); }

    .auth-card {
      background: linear-gradient(160deg, var(--bg-elevated) 0%, var(--bg-surface) 100%);
      border: 1px solid var(--border-default);
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow:
        0 8px 48px rgba(0,0,0,.55),
        0 0 0 1px rgba(200,144,42,.06),
        inset 0 1px 0 rgba(210,185,145,.07);
    }

    .auth-heading {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -.025em;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 7px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border-default);
      border-radius: 9px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: rgba(200,144,42,.5);
      box-shadow: 0 0 0 3px rgba(200,144,42,.10);
    }
    .form-input.error {
      border-color: rgba(160,56,56,.6);
      box-shadow: 0 0 0 3px rgba(160,56,56,.08);
    }

    .auth-error {
      background: rgba(160,56,56,.08);
      border: 1px solid rgba(160,56,56,.28);
      border-radius: 9px;
      color: var(--red);
      font-size: 13px;
      line-height: 1.5;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: none;
    }
    .auth-error.visible { display: block; }

    .auth-success {
      background: rgba(46,158,106,.08);
      border: 1px solid rgba(46,158,106,.25);
      border-radius: 9px;
      color: var(--green);
      font-size: 13px;
      line-height: 1.6;
      padding: 12px 16px;
      display: none;
      text-align: center;
    }
    .auth-success.visible { display: block; }
    .auth-success strong { display: block; font-size: 15px; margin-bottom: 4px; }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #d4982e 0%, #c8902a 100%);
      color: #0a0807;
      border: none;
      border-radius: 9px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
      padding: 13px;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s, transform .1s;
    }
    .btn-submit:hover:not(:disabled) {
      opacity: .92;
      box-shadow: 0 6px 28px rgba(200,144,42,.40);
      transform: translateY(-1px);
    }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(10,8,7,.3);
      border-top-color: #0a0807;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer-row {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .auth-footer-row a {
      color: var(--yellow);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer-row a:hover { opacity: .75; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; border-radius: 14px; }
      .auth-nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <nav class="auth-nav">
    <a href="/landing" class="auth-nav-logo">AURUM <span>SIGNALS</span></a>
    <a href="/login" class="auth-nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
      Back to Sign In
    </a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-container">

      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="auth-brand-name">AURUM <span>SIGNALS</span></div>
      </div>

      <div class="auth-card">
        <div class="auth-heading">Reset your password</div>
        <div class="auth-sub">
          Enter the email address for your account and we'll send you a password reset link.
        </div>

        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess">
          <strong>Check your email</strong>
          If that address is registered, a reset link has been sent. The link expires in 1 hour.
        </div>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            Send Reset Link
          </button>
        </form>

        <div class="auth-footer-row">
          Remember your password? <a href="/login">Sign in</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      const form    = document.getElementById('forgotForm');
      const btn     = document.getElementById('submitBtn');
      const errBox  = document.getElementById('authError');
      const success = document.getElementById('authSuccess');
      const emailEl = document.getElementById('email');

      function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.add('visible');
        success.classList.remove('visible');
      }
      function clearError() { errBox.classList.remove('visible'); }
      function setLoading(on) {
        btn.disabled = on;
        btn.innerHTML = on ? '<span class="spinner"></span>Sending…' : 'Send Reset Link';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearError();

        const email = emailEl.value.trim();
        if (!email) { showError('Please enter your email address.'); emailEl.focus(); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.'); emailEl.focus(); return;
        }

        setLoading(true);
        try {
          const res  = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ email }),
          });
          const data = await res.json();

          if (!res.ok) {
            showError(data.error || 'Request failed. Please try again.');
          } else {
            form.style.display = 'none';
            success.classList.add('visible');
          }
        } catch {
          showError('Network error. Please check your connection and try again.');
        } finally {
          setLoading(false);
        }
      });

      emailEl.addEventListener('input', () => {
        emailEl.classList.remove('error');
        clearError();
      });
    })();
  </script>

</body>
</html>
